server {
    listen 80;
    server_name _;

    # ── Main Surveillance Dashboard (Laptop) ──
    location = / {
        root /home/pi/nightwing/frontend;
        try_files /index.html =404;
    }

    # ── Mobile Robot Controller (Phone) ──
    location /controller {
        alias /home/pi/nightwing/frontend/controller.html;
        default_type text/html;
    }

    # ── Frontend Static Assets (CSS, JS) ──
    location ~* \.(js|css|png|jpg|ico|woff2?)$ {
        root /home/pi/nightwing/frontend;
        expires 1h;
        add_header Cache-Control "public";
    }

    # ── REST API ──
    location /api/ {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # ── WebRTC Signaling ──
    location /webrtc/ {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # ── Recording Endpoints ──
    location /recording/ {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # ── Socket.IO WebSocket (keep-alive for motor + sensor) ──
    location /socket.io/ {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host       $host;
        proxy_set_header X-Real-IP  $remote_addr;
        proxy_read_timeout  3600s;
        proxy_send_timeout  3600s;
    }
}
